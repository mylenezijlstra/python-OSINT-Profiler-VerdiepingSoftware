<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Profiler | Identity Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>OSINT Profiler</h1>
            <p>Intelligence gathering through social identity mapping</p>
        </header>

        <main>
            <section class="search-container">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="lastName" placeholder="Last Name" required>
                    </div>
                    <button id="searchBtn">Initiate Scan</button>
                </div>
                <p style="font-size: 0.9rem; color: var(--text-secondary);">
                    Checks common username patterns and generates deep-links for manual reconnaissance.
                </p>
            </section>

            <div id="loader" class="loader-container">
                <div class="loader"></div>
                <p class="scanning-text">SCANNING GLOBAL NETWORKS...</p>
            </div>

            <section id="resultsSection" class="results-section">
                <div class="section-title">
                    <span>🔍</span> Profiles Found
                </div>
                <div id="profilesGrid" class="grid">
                    <!-- Cards will be injected here -->
                </div>

                <div class="section-title">
                    <span>⛓️</span> Deep Search Links
                </div>
                <div id="deepLinksGrid" class="deep-links-container">
                    <!-- Links will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
